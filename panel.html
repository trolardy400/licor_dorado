<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Panel de Control | Licor Dorado</title>

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Estilos compartidos -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="toast"></div>
<div id="print-view" style="display:none"></div>

<div class="panel-wrapper">

    <!-- ══ Header ══ -->
    <header class="panel-header no-print">
        <div class="panel-logo">
            <div class="panel-badge">
                <span style="color:#000;font-size:12px;font-weight:900">LD</span>
            </div>
            <div>
                <p class="panel-title">Panel de Control</p>
                <p class="panel-subtitle">LICOR DORADO · GESTIÓN DE BODEGA</p>
            </div>
        </div>
        <a href="index.html" class="panel-home-link no-print" >
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Ver página principal
        </a>
    </header>

    <div class="panel-grid">

        <!-- ══ Columna izquierda ══ -->
        <div class="panel-left">

            <!-- Formulario -->
            <div class="glass panel-card">
                <h2 class="panel-card-title" id="form-title">Añadir Producto</h2>

                <input type="hidden" id="edit-id">

                <div class="panel-form-fields">
                    <div>
                        <label class="panel-label" for="f-nombre">Nombre</label>
                        <input type="text" id="f-nombre" class="field" placeholder="Ej: Hidromiel 1L">
                    </div>
                    <div>
                        <label class="panel-label" for="f-desc">Descripción</label>
                        <textarea id="f-desc" class="field" rows="2"
                                  placeholder="Notas de sabor…"
                                  style="resize:none"></textarea>
                    </div>
                    <div class="panel-grid-2">
                        <div>
                            <label class="panel-label" for="f-precio">Precio (Bs.)</label>
                            <input type="number" id="f-precio" class="field"
                                   placeholder="0.00" min="0" step="0.01">
                        </div>
                        <div>
                            <label class="panel-label" for="f-stock">Stock</label>
                            <input type="number" id="f-stock" class="field"
                                   placeholder="0" min="0">
                        </div>
                    </div>
                    <div>
                        <label class="panel-label" for="f-img">URL de Imagen</label>
                        <input type="text" id="f-img" class="field" placeholder="https://…">
                    </div>

                    <div class="panel-btn-row">
                        <button onclick="guardar()" class="btn-guardar">Guardar</button>
                        <button onclick="cancelarEdicion()" id="btn-cancelar" class="btn-cancelar">Cancelar</button>
                    </div>
                </div>
            </div>

            <!-- Exportar -->
            <div class="glass panel-card no-print">
                <h2 class="panel-card-title">Exportar Catálogo</h2>
                <div class="export-buttons">
                    <button onclick="exportJSON()" class="btn-export btn-export-json">
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                        </svg>
                        Descargar JSON
                    </button>
                    <button onclick="exportCSV()" class="btn-export btn-export-csv">
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <line x1="3" y1="9" x2="21" y2="9"/>
                            <line x1="3" y1="15" x2="21" y2="15"/>
                            <line x1="9" y1="3" x2="9" y2="21"/>
                        </svg>
                        Descargar CSV
                    </button>
                    <button onclick="publicarCatalogo()" class="btn-export"
                            style="color:#d4af37;border:1px solid rgba(212,175,55,.3);background:rgba(212,175,55,.07)">
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <polyline points="16 16 12 12 8 16"/>
                            <line x1="12" y1="12" x2="12" y2="21"/>
                            <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
                        </svg>
                        Publicar Catálogo
                    </button>
                    <button onclick="imprimirPDF()" class="btn-export btn-export-pdf">
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 6 2 18 2 18 9"/>
                            <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
                            <rect x="6" y="14" width="12" height="8"/>
                        </svg>
                        Imprimir / PDF
                    </button>
                </div>
                    <button onclick="publicarCatalogo()" class="btn-export" style="
                        color:#fff;
                        border: 1px solid rgba(212,175,55,.35);
                        background: rgba(212,175,55,.08);
                        margin-top: 6px;
                        font-size:12px;
                        padding: 14px 16px;
                        border-radius: 14px;">
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <polyline points="16 16 12 12 8 16"/>
                            <line x1="12" y1="12" x2="12" y2="21"/>
                            <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
                        </svg>
                        Publicar Catálogo
                    </button>
                </div>
                <p id="last-update">—</p>
            </div>
        </div>

        <!-- ══ Inventario (derecha) ══ -->
        <div>
            <div class="inventario-header">
                <h2 class="inventario-title">Inventario</h2>
                <span id="counter">0 productos</span>
            </div>
            <div id="lista"></div>
            <div id="empty-msg">Sin productos. ¡Añade el primero!</div>
        </div>

    </div>
</div>

<!-- Script del panel -->
<script type="module" src="panel.js"></script>
</body>
</html>
